<div class="region-container">
  <h2> Kanto Region</h2>

  <div class="card-grid">
    @for (pokemon of pokemonService.kantoPokemons(); track pokemon.name) {
      <div class="card">
        <h3>{{ pokemon.name }}</h3>
        <p><span class="label">Type:</span> {{ pokemon.type }}</p>
        <p><span class="label">Held Item:</span> {{ pokemon.heldItem }}</p>
        <p class="desc">{{ pokemon.description }}</p>
      </div>
    }
  </div>
</div>
