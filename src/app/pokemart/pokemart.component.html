<div class="mart">
  <h2>PokeMart</h2>

  <div class="items-grid">
    @for (item of pokemonService.martItems(); track item.id) {
      <div class="item-card">
        <h3>{{ item.name }}</h3>
        <p>₱{{ item.price }}</p>
        <button (click)="pokemonService.addToCart(item)">Add to Cart</button>
      </div>
    }
  </div>
  
  <app-cart /> 

</div>
